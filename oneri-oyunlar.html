dy{padding:14px;display:flex;flex-direction:column;gap:10px;flex:1}.rec-title{font-size:1.05rem;font-weight:900;line-height:1.25}.rec-meta,.reason-list{display:flex;flex-wrap:wrap;gap:6px}.pill,.reason{font-size:.72rem;background:#12223a;color:#cdd9ea;border:1px solid #203855;border-radius:7px;padding:4px 7px;font-weight:700;line-height:1.2}.reason{background:rgba(0,217,255,.08);border-color:rgba(0,217,255,.24);color:#c9f7ff}.rec-note{color:#cbd7e8;font-size:.85rem;line-height:1.58;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}.rec-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:auto}.steam-btn{color:#66c0f4;border-color:rgba(102,192,244,.42);background:rgba(102,192,244,.08)}.copy-btn,.detail-btn{font-size:.78rem;padding-left:8px;padding-right:8px}.empty{grid-column:1/-1;text-align:center;border:1px dashed var(--stroke);border-radius:16px;padding:48px;color:var(--muted);background:rgba(10,17,30,.34)}

<script>
const recommendations = window.RECOMMENDATIONS || [];
const libraryGames = window.GAMES || [];
const state = {genre:'all', search:'', sort:'match', hideOwned:true};

const splitTags = value => String(value || '').split(/[,·]/).map(item => item.trim()).filter(Boolean);
const mainGenre = value => splitTags(value)[0] || 'Bilinmiyor';
const xe = value => String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const normalize = value => String(value || '').toLocaleLowerCase('tr').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();
const ownedTitles = new Set(libraryGames.map(game => normalize(game.title)));
const ownedCount = recommendations.filter(rec => ownedTitles.has(normalize(rec.title))).length;

function buildAffinity(){
  const counts = {};
  const topPlatform = Object.entries(libraryGames.reduce((acc, game) => {
    const key = game.platform || 'Bilinmiyor';
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {})).sort((a,b) => b[1] - a[1])[0]?.[0] || 'PC';

  libraryGames.forEach(game => {
    const rating = Number(game.rating) || 0;
    const weight = game.featured ? 3 : rating >= 9 ? 3 : rating >= 8 ? 2 : rating >= 7 ? 1 : 0.35;
    splitTags(game.genre).forEach(tag => {
      counts[tag] = (counts[tag] || 0) + weight;
    });
  });

  const topTags = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0,6).map(([name]) => name);
  return {counts, topTags, topPlatform};
}

const affinity = buildAffinity();

function recTags(rec){
  return [...splitTags(rec.genre), ...(rec.tags || []), rec.tag, rec.mood].filter(Boolean);
}

function analyzeRecommendation(rec){
  const tags = recTags(rec);
  const owned = ownedTitles.has(normalize(rec.title));
  const matchedTags = tags.filter(tag => affinity.counts[tag]);
  const topMatched = [...new Set(matchedTags)].slice(0,3);
  let score = 42 + (Number(rec.priority) || 70) / 5;
  matchedTags.forEach(tag => { score += Math.min(18, affinity.counts[tag] * 2.2); });
  if ((rec.platform || '').includes(affinity.topPlatform)) score += 8;
  if (owned) score -= 45;
  score = Math.max(32, Math.min(98, Math.round(score)));

  const reasons = [];
  if (topMatched.length) reasons.push(`${topMatched.join(', ')} sevenleri için`);
  if ((rec.platform || '').includes(affinity.topPlatform)) reasons.push(`${affinity.topPlatform} `); // Platform yazısı
  if (Number(rec.priority) >= 90) reasons.push('Öncelikli öneri');
  if (!reasons.length) reasons.push('Kütüphaneyi farklılaştırır');

  return {...rec, tags, owned, score, reasons};
}

function allScored(){
  return recommendations.map(analyzeRecommendation);
}

function filteredRecommendations(){
  const query = normalize(state.search);
  let list = allScored().filter(rec => {
    const genreOk = state.genre === 'all' || rec.tags.some(tag => normalize(tag) === normalize(state.genre));
    const text = normalize([rec.title, rec.genre, rec.platform, rec.tag, rec.mood, rec.note, rec.tags.join(' ')].join(' '));
    const searchOk = !query || text.includes(query);
    const ownedOk = !state.hideOwned || !rec.owned;
    return genreOk && searchOk && ownedOk;
  });

  list.sort((a,b) => {
    if (state.sort === 'priority') return (Number(b.priority) || 0) - (Number(a.priority) || 0);
    if (state.sort === 'title') return a.title.localeCompare(b.title, 'tr');
    if (state.sort === 'genre') return mainGenre(a.genre).localeCompare(mainGenre(b.genre), 'tr') || b.score - a.score;
    return b.score - a.score || (Number(b.priority) || 0) - (Number(a.priority) || 0);
  });
  return list;
}

function renderGenres(){
  const counts = {};
  allScored().forEach(rec => {
    rec.tags.forEach(tag => counts[tag] = (counts[tag] || 0) + 1);
  });
  const entries = [['all', recommendations.length], ...Object.entries(counts).sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0], 'tr')).slice(0,14)];
  const html = entries.map(([name,count]) => {
    const label = name === 'all' ? 'Tümü' : name;
    const active = state.genre === name || (state.genre === 'all' && name === 'all');
    return `<button class="nav-item ${active ? 'active' : ''}" type="button" data-genre="${xe(name)}"><span class="nav-icon">${name === 'all' ? '☷' : '◇'}</span><span class="nav-text">${xe(label)}</span><span class="nav-count">${count}</span></button>`;
  }).join('');
  document.getElementById('genreNav').innerHTML = html;
  document.getElementById('mobileGenreNav').innerHTML = html;
}

function renderInsights(list){
  const top = list[0];
  const dominantGenre = affinity.topTags[0] || 'RPG';
  const avgScore = list.length ? Math.round(list.reduce((sum, rec) => sum + rec.score, 0) / list.length) : 0;
  document.getElementById('insightGrid').innerHTML = [
    ['En Güçlü Eşleşme', top ? top.title : 'Öneri yok', top ? `${top.score}/100 uyum • ${top.reasons[0]}` : 'Filtreleri temizleyince liste yeniden dolar.'],
    ['Baskın Tür', dominantGenre, `${affinity.topTags.slice(0,3).join(', ') || 'Kütüphane verisi'} öne çıkıyor.`],
    ['Ortalama Uyum', avgScore ? `${avgScore}/100` : '—', `${list.length} öneri hesaba katıldı.`],
    ['Gizlenenler', `${state.hideOwned ? ownedCount : 0}`, 'Kütüphanede bulunan başlıklar.']
  ].map(item => `<article class="insight"><small>${xe(item[0])}</small><b>${xe(item[1])}</b><span>${xe(item[2])}</span></article>`).join('');
}

function renderRecommendations(){
  const list = filteredRecommendations();
  renderGenres();
  renderInsights(list);
  document.getElementById('recInfo').textContent = `${list.length} öneri listeleniyor`;

  if (!recommendations.length) {
    document.getElementById('recGrid').innerHTML = '<div class="empty">Öneri verisi yüklenemedi.</div>';
    return;
  }
  if (!list.length) {
    document.getElementById('recGrid').innerHTML = '<div class="empty">Bu filtrelerle eşleşen öneri bulunamadı.</div>';
    return;
  }

  document.getElementById('recGrid').innerHTML = list.map((rec, index) => {
    const pills = [mainGenre(rec.genre), rec.platform, rec.tag].filter(Boolean).map(tag => `<span class="pill">${xe(tag)}</span>`).join('');
    const reasons = rec.reasons.map(reason => `<span class="reason">${xe(reason)}</span>`).join('');
    const image = rec.cover ? `<img src="${xe(rec.cover)}" alt="${xe(rec.title)}" loading="lazy" onerror="this.style.display='none';this.parentElement.classList.add('missing')">` : '';
    return `<article class="rec-card">
  <div class="rec-cover">${image}<span class="rec-score">${rec.score}/100</span>${rec.owned ? '<span class="owned-badge">Kütüphanede</span>' : ''}</div>
  <div class="rec-body">
    <h2 class="rec-title">${xe(rec.title)}</h2>
    <div class="rec-meta">${pills}</div>
    <p class="rec-note">${xe(rec.note)}</p>
    <div class="reason-list">${reasons}</div>
    <div class="rec-actions">
      <a class="steam-btn" href="${xe(rec.steam)}" target="_blank" rel="noopener noreferrer">Sayfa</a>
      <button class="detail-btn" type="button" data-open-rec="${index}">Detay</button>
      <button class="copy-btn" type="button" data-copy-title="${xe(rec.title)}">Başlığı Kopyala</button>
    </div>
  </div>
</article>`;
  }).join('');
}

function openRecommendation(rec){
  if (!rec) return;
  document.getElementById('modalCover').src = rec.cover || '';
  document.getElementById('modalContent').innerHTML = `<h2 id="modalTitle">${xe(rec.title)}</h2>
    <div class="rec-meta"><span class="pill">${xe(mainGenre(rec.genre))}</span><span class="pill">${xe(rec.platform)}</span><span class="pill">${xe(rec.tag)}</span><span class="pill">${rec.score}/100 uyum</span></div>
    <div class="reason-list">${rec.reasons.map(reason => `<span class="reason">${xe(reason)}</span>`).join('')}</div>
    <div class="note-box">${xe(rec.note)}</div>
    <div class="modal-actions"><a class="steam-btn" href="${xe(rec.steam)}" target="_blank" rel="noopener noreferrer">Sayfasına Git</a><button class="copy-btn" type="button" data-copy-title="${xe(rec.title)}">Başlığı Kopyala</button></div>`;
  document.getElementById('recModal').classList.add('open');
  document.getElementById('recModal').setAttribute('aria-hidden', 'false');
}

function closeModal(){
  document.getElementById('recModal').classList.remove('open');
  document.getElementById('recModal').setAttribute('aria-hidden', 'true');
}

function showToast(message){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1600);
}

async function copyTitle(title){
  try {
    await navigator.clipboard.writeText(title);
  } catch {
    const input = document.createElement('textarea');
    input.value = title;
    input.setAttribute('readonly', '');
    input.style.position = 'fixed';
    input.style.opacity = '0';
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    input.remove();
  }
  showToast(`${title} kopyalandı.`);
}

function bindEvents(){
  document.getElementById('recSearch').addEventListener('input', event => {
    state.search = event.target.value;
    renderRecommendations();
  });
  document.getElementById('sortSelect').addEventListener('change', event => {
    state.sort = event.target.value;
    renderRecommendations();
  });
  document.getElementById('hideOwned').addEventListener('change', event => {
    state.hideOwned = event.target.checked;
    renderRecommendations();
  });
  document.getElementById('surpriseBtn').addEventListener('click', () => {
    const pool = filteredRecommendations().slice(0, 5);
    openRecommendation(pool[Math.floor(Math.random() * pool.length)]);
  });
  document.addEventListener('click', event => {
    const genreButton = event.target.closest('[data-genre]');
    if (genreButton) {
      state.genre = genreButton.dataset.genre;
      renderRecommendations();
      return;
    }
    const openButton = event.target.closest('[data-open-rec]');
    if (openButton) {
      openRecommendation(filteredRecommendations()[Number(openButton.dataset.openRec)]);
      return;
    }
    const copyButton = event.target.closest('[data-copy-title]');
    if (copyButton) copyTitle(copyButton.dataset.copyTitle);
  });
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('recModal').addEventListener('click', event => {
    if (event.target.id === 'recModal') closeModal();
  });
  document.addEventListener('keydown', event => {
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
      event.preventDefault();
      document.getElementById('recSearch').focus();
    }
    if (event.key === 'Escape') closeModal();
  });
}

bindEvents();
renderRecommendations();
</script>
</body>
</html>
